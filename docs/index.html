<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业营收监测系统</title>
<style>
:root {
  --blue: #1a56db;
  --blue-light: #e8f0fe;
  --blue-dark: #103c8c;
  --red: #dc2626;
  --red-light: #fef2f2;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --gray-border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 10px 15px rgba(0,0,0,.05);
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background:#f8fafc; color:#1e293b; line-height:1.6; min-height:100vh; }
.container { max-width:1200px; margin:0 auto; padding:0 16px; }

/* Header */
.header { background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%); color:#fff; padding:20px 16px; position:sticky; top:0; z-index:100; }
.header .container { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
.header h1 { font-size:18px; font-weight:600; }
.header .meta { font-size:13px; opacity:.85; }
.header .badge-row { display:flex; gap:6px; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; font-size:12px; font-weight:500; }
.badge-danger { background:rgba(255,255,255,.2); color:#fecaca; }
.badge-warning { background:rgba(255,255,255,.2); color:#fed7aa; }
.badge-info { background:rgba(255,255,255,.2); color:#bfdbfe; }

/* Tabs */
.tabs { display:flex; background:#fff; border-bottom:2px solid var(--gray-border); position:sticky; top:60px; z-index:99; overflow-x:auto; }
.tab-btn { flex:1; min-width:80px; padding:14px 8px; border:none; background:none; font-size:14px; font-weight:500; color:var(--gray); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:.2s; white-space:nowrap; }
.tab-btn.active { color:var(--blue); border-bottom-color:var(--blue); }
.tab-btn .tab-icon { display:block; font-size:18px; margin-bottom:2px; }
.tab-content { display:none; padding:16px 0 32px; }
.tab-content.active { display:block; }

/* KPI Cards */
.kpi-grid { margin-bottom:20px; }
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:12px; }
.kpi-row:last-child { margin-bottom:0; }
.kpi-card { background:#fff; border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
.kpi-card .kpi-label { font-size:12px; color:var(--gray); margin-bottom:4px; }
.kpi-card .kpi-value { font-size:28px; font-weight:700; }
.kpi-card .kpi-sub { font-size:12px; color:var(--gray); margin-top:4px; }
.kpi-card.danger { border-left:3px solid var(--red); }
.kpi-card.danger .kpi-value { color:var(--red); }
.kpi-card.warning { border-left:3px solid var(--orange); }
.kpi-card.normal { border-left:3px solid var(--green); }
.kpi-card.info { border-left:3px solid var(--blue); }

/* Section */
.section-title { font-size:16px; font-weight:600; margin:20px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--gray-border); display:flex; align-items:center; gap:8px; }
.section-title .dot { width:8px; height:8px; border-radius:50%; background:var(--blue); }

/* Bar Chart (SVG) */
.chart-wrap { background:#fff; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); margin-bottom:16px; }
.chart-wrap svg { width:100%; height:auto; }
.chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
.chart-toggle { display:flex; gap:0; border-radius:6px; overflow:hidden; border:1px solid var(--gray-border); }
.ct-btn { padding:6px 14px; border:none; background:#fff; font-size:12px; font-weight:500; color:var(--gray); cursor:pointer; border-right:1px solid var(--gray-border); transition:.15s; }
.ct-btn:last-child { border-right:none; }
.ct-btn.active { background:var(--blue); color:#fff; }
.ct-btn:hover:not(.active) { background:var(--blue-light); color:var(--blue); }

/* Warning List */
.warn-list { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.warn-header { display:flex; align-items:center; padding:10px 16px; border-bottom:2px solid var(--gray-border); background:var(--gray-light); gap:12px; font-size:11px; color:var(--gray); font-weight:500; }
.warn-header .wh-rank { width:24px; text-align:center; flex-shrink:0; }
.warn-header .wh-name { flex:1; min-width:0; }
.warn-header .wh-gap { width:72px; text-align:right; flex-shrink:0; }
.warn-header .wh-rate { width:60px; text-align:right; flex-shrink:0; }
.warn-item { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--gray-light); gap:12px; cursor:pointer; transition:.15s; }
.warn-item:last-child { border-bottom:none; }
.warn-item:hover { background:var(--gray-light); }
.warn-item.danger { background:var(--red-light); }
.warn-item .warn-rank { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }
.warn-item .warn-rank.danger { background:var(--red); }
.warn-item .warn-rank.warning { background:var(--orange); }
.warn-item .warn-info { flex:1; min-width:0; }
.warn-item .warn-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.warn-item .warn-area { font-size:11px; color:var(--gray); }
.warn-item .warn-gap { width:72px; text-align:right; flex-shrink:0; font-size:16px; font-weight:600; color:var(--red); }
.warn-item .warn-rate { width:60px; text-align:right; flex-shrink:0; font-size:12px; color:var(--gray); }

/* Tree */
.tree-wrap { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); }
.search-box { padding:12px 16px; border-bottom:1px solid var(--gray-border); }
.search-box input { width:100%; padding:10px 12px; border:1px solid var(--gray-border); border-radius:6px; font-size:14px; outline:none; }
.search-box input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,86,219,.1); }
.tree-node { border-bottom:1px solid var(--gray-light); }
.tree-node:last-child { border-bottom:none; }
.tree-header { display:flex; align-items:center; padding:12px 16px; cursor:pointer; gap:8px; transition:.15s; }
.tree-header:hover { background:var(--gray-light); }
.tree-header .arrow { width:20px; height:20px; display:flex; align-items:center; justify-content:center; transition:.2s; font-size:12px; color:var(--gray); flex-shrink:0; }
.tree-header.expanded .arrow { transform:rotate(90deg); }
.tree-header .node-icon { font-size:16px; flex-shrink:0; }
.tree-header .node-name { font-weight:500; font-size:14px; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tree-header .node-stats { display:flex; gap:12px; font-size:12px; color:var(--gray); flex-shrink:0; }
.tree-header .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.tree-header .status-dot.danger { background:var(--red); }
.tree-header .status-dot.warning { background:var(--orange); }
.tree-header .status-dot.normal { background:var(--green); }
.tree-header .status-dot.exited { background:var(--gray); }
.tree-children { display:none; }
.tree-children.open { display:block; }
.tree-children .tree-node { margin-left:24px; }
.tree-row { display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid var(--gray-light); gap:4px; font-size:13px; transition:.15s; cursor:pointer; }
.tree-row:hover { background:var(--gray-light); }
.tree-row:last-child { border-bottom:none; }
.tree-row.danger { background:var(--red-light); }
.tree-row.danger:hover { background:#fee2e2; }
.tree-row.exited { opacity:.6; }
.tree-row .col-name { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
.tree-row .col-num { width:64px; text-align:right; flex-shrink:0; }
.tree-row .col-rate { width:54px; text-align:right; flex-shrink:0; }
.tree-row .col-target { width:60px; text-align:right; flex-shrink:0; color:var(--gray); }
.tree-row .col-gap { width:62px; text-align:right; flex-shrink:0; font-weight:600; }
.tree-row .col-gap2 { width:62px; text-align:right; flex-shrink:0; }
.tree-row .col-gap.negative { color:var(--red); }
.tree-row .col-gap.positive { color:var(--green); }
.tree-row .col-gap2.negative { color:var(--red); }
.tree-row .col-gap2.positive { color:var(--green); }
.tree-row .col-status { width:56px; text-align:right; flex-shrink:0; }

/* Tree columns header */
.tree-cols { display:flex; align-items:center; padding:8px 16px; font-size:11px; color:var(--gray); border-bottom:2px solid var(--gray-light); background:var(--gray-light); }
.tree-cols span { flex-shrink:0; text-align:right; }
.tree-cols .col-name { flex:1; text-align:left; }
.tree-cols .col-num { width:64px; }
.tree-cols .col-rate { width:54px; }
.tree-cols .col-target { width:60px; }
.tree-cols .col-gap { width:62px; }
.tree-cols .col-gap2 { width:62px; }
.tree-cols .col-status { width:56px; }
.tree-cols span.col-target, .tree-cols span.col-gap2 { font-size:11px; }
/* Report filter */
.report-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
.report-filter { padding:6px 12px; border:1px solid var(--gray-border); border-radius:6px; font-size:13px; background:#fff; color:#374151; outline:none; cursor:pointer; }
.report-filter:focus { border-color:var(--blue); }
.report-group-title { font-size:13px; font-weight:600; padding:8px 0 4px; margin:12px 0 8px; border-bottom:2px solid var(--gray-border); grid-column:1/-1; }
.report-group-title.danger { color:var(--red); border-color:var(--red-light); }
.report-group-title.warning { color:var(--orange); border-color:var(--orange-light); }
.report-group-title.exited { color:var(--gray); border-color:var(--gray-light); }

/* Status legend in tree tab */
.status-legend { display:flex; flex-wrap:wrap; gap:12px; padding:10px 14px; background:var(--gray-light); border-radius:6px; margin-bottom:12px; font-size:12px; color:#4b5563; }
.sl-item { display:inline-flex; align-items:center; gap:4px; }

/* Report Cards */
.report-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
.report-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; break-inside:avoid; }
.report-card.danger { border-top:3px solid var(--red); }
.report-card.warning { border-top:3px solid var(--orange); }
.report-card.exited { border-top:3px solid var(--gray); opacity:.7; }
.report-card-header { padding:16px; border-bottom:1px solid var(--gray-light); }
.report-card-header .rc-name { font-size:15px; font-weight:600; margin-bottom:4px; }
.report-card-header .rc-meta { font-size:12px; color:var(--gray); display:flex; gap:8px; }
.report-card-data { padding:12px 16px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.report-card-data .rd-item { text-align:center; }
.report-card-data .rd-val { font-size:20px; font-weight:700; }
.report-card-data .rd-val.red { color:var(--red); }
.report-card-data .rd-val.green { color:var(--green); }
.report-card-data .rd-label { font-size:11px; color:var(--gray); }
.report-card-keywords { padding:12px 16px; display:flex; flex-wrap:wrap; gap:6px; }
.report-card-keywords .kw-tag { padding:3px 9px; border-radius:4px; font-size:12px; background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; white-space:nowrap; }
.report-card-keywords .kw-section { width:100%; font-size:12px; color:#dc2626; font-weight:700; margin-bottom:4px; }
.report-card-notes-wrap { padding:0 16px 12px; }
.report-card-notes-toggle { font-size:12px; color:var(--blue); cursor:pointer; padding:4px 0; display:inline-block; user-select:none; }
.report-card-notes-toggle:hover { text-decoration:underline; }
.report-card-notes-body { display:none; font-size:13px; color:#4b5563; line-height:1.7; padding-top:6px; margin-top:6px; border-top:1px dashed var(--gray-border); }
.report-card-notes-body.open { display:block; }
.report-card-notes { padding:0 16px 16px; font-size:13px; color:#4b5563; line-height:1.7; }

/* Status badge in tables */
.status-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
.status-badge.danger { background:var(--red-light); color:var(--red); }
.status-badge.warning { background:var(--orange-light); color:var(--orange); }
.status-badge.normal { background:var(--green-light); color:var(--green); }
.status-badge.exited { background:var(--gray-light); color:var(--gray); }

/* Type summary cards */
.type-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }
.type-card { background:#fff; border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); text-align:center; }
.type-card .tc-icon { font-size:24px; margin-bottom:4px; }
.type-card .tc-name { font-size:13px; font-weight:500; margin-bottom:2px; }
.type-card .tc-label { font-size:11px; color:#9ca3af; margin-bottom:6px; }
.type-card .tc-value { font-size:22px; font-weight:700; color:var(--blue); }
.type-card .tc-sub { font-size:11px; color:var(--gray); margin-top:2px; }

/* Print */
@media print {
  .header, .tabs { position:static; }
  .tab-content { display:block!important; page-break-before:always; }
  .tab-content:first-of-type { page-break-before:avoid; }
  .report-grid { grid-template-columns:1fr 1fr; }
}

/* Detail popup */
.detail-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:flex; align-items:center; justify-content:center; }
.detail-popup { background:#fff; border-radius:12px; width:90vw; max-width:560px; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.15); }
.detail-popup-header { padding:20px; border-bottom:1px solid var(--gray-border); display:flex; justify-content:space-between; align-items:flex-start; }
.detail-popup-header .dp-name { font-size:18px; font-weight:600; }
.detail-popup-header .dp-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--gray); padding:4px 8px; }
.detail-popup-body { padding:20px; }
.detail-popup-body table { width:100%; border-collapse:collapse; }
.detail-popup-body td { padding:8px 12px; border-bottom:1px solid var(--gray-light); font-size:13px; }
.detail-popup-body td:first-child { color:var(--gray); width:100px; white-space:nowrap; }
.detail-popup-body td:last-child { font-weight:500; }
.detail-notes { margin-top:12px; padding:12px; background:var(--gray-light); border-radius:6px; font-size:13px; line-height:1.7; }

/* Insight: growth band rows */
.growth-band-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.growth-band-row .gb-label { width:110px; text-align:right; flex-shrink:0; font-size:12px; color:#6b7280; }
.growth-band-row .gb-bar-wrap { flex:1; height:24px; border-radius:4px; position:relative; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600; }
.growth-band-row .gb-count { width:28px; text-align:right; flex-shrink:0; font-weight:600; font-size:12px; }
.growth-band-row .gb-pct { width:44px; text-align:right; flex-shrink:0; color:#9ca3af; font-size:12px; }
.growth-band-row .gb-companies { font-size:12px; color:#9ca3af; padding-left:118px; }

/* Insight: area rank table */
.area-rank-table { width:100%; border-collapse:collapse; font-size:13px; }
.area-rank-table th { text-align:left; padding:10px 12px; font-size:11px; color:#9ca3af; border-bottom:2px solid #f3f4f6; font-weight:500; }
.area-rank-table th:last-child, .area-rank-table td:last-child { text-align:center; }
.area-rank-table td { padding:10px 12px; border-bottom:1px solid #f9fafb; }
.area-rank-table tr:hover td { background:#f9fafb; }
.area-rank-table .rank-num { font-weight:700; width:36px; color:#9ca3af; }
.area-rank-table .growth-val { font-weight:600; }
.area-rank-table .growth-val.positive { color:#16a34a; }
.area-rank-table .growth-val.negative { color:#dc2626; }

/* Insight: leader cards */
.leader-card { background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:16px; }
.leader-card .lc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.leader-card .lc-name { font-size:14px; font-weight:600; }
.leader-card .lc-growth { font-size:18px; font-weight:700; }
.leader-card .lc-growth.positive { color:#16a34a; }
.leader-card .lc-meta { font-size:11px; color:#6b7280; margin-bottom:4px; display:flex; gap:6px; }
.leader-card .lc-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; background:#f0fdf4; color:#16a34a; }
.leader-card .lc-reason { font-size:12px; color:#4b5563; line-height:1.6; }

/* Insight: risk cards */
.risk-card { background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:16px; margin-bottom:12px; }
.risk-card.danger { border-left:3px solid #dc2626; }
.risk-card.warning { border-left:3px solid #ea580c; }
.risk-card .risk-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.risk-card .risk-icon { font-size:18px; }
.risk-card .risk-title { font-size:15px; font-weight:700; }
.risk-card .risk-desc { font-size:13px; color:#4b5563; line-height:1.8; margin-bottom:8px; }
.risk-card .risk-enterprises { font-size:11px; color:#9ca3af; }

/* Insight: action items */
.action-list { }
.action-item { background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:16px; margin-bottom:10px; display:flex; gap:12px; align-items:flex-start; }
.action-item .ai-priority { padding:3px 10px; border-radius:4px; font-size:11px; font-weight:700; flex-shrink:0; }
.action-item .ai-priority.urgent { color:#dc2626; background:#fef2f2; }
.action-item .ai-priority.important { color:#ea580c; background:#fff7ed; }
.action-item .ai-priority.continuous { color:#1a56db; background:#e8f0fe; }
.action-item .ai-content { flex:1; }
.action-item .ai-action { font-size:14px; font-weight:600; margin-bottom:4px; }
.action-item .ai-detail { font-size:12px; color:#4b5563; line-height:1.7; }

/* Insight: growth note box */
.insight-note { font-size:12px; color:#6b7280; margin-top:12px; padding:10px 14px; background:#f9fafb; border-radius:6px; }

/* ============================================= */
/* MOBILE — 平板/中等手机 (max-width: 768px)        */
/* ============================================= */
@media (max-width:768px) {
  .container { padding:0 12px; }
  
  /* Header */
  .header { padding:14px 12px; }
  .header h1 { font-size:17px; }
  .header .meta { font-size:11px; }
  .badge-row { gap:6px; }
  .badge { font-size:10px; padding:2px 8px; }

  /* Tabs */
  .tabs { gap:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tab-btn { font-size:13px; padding:12px 10px; white-space:nowrap; flex-shrink:0; }
  
  /* KPI cards — 2列 */
  .kpi-row { grid-template-columns:1fr 1fr; gap:8px; }
  .kpi-card { padding:12px; }
  .kpi-card .kpi-value { font-size:24px; }
  .kpi-card .kpi-label { font-size:11px; }
  .kpi-card .kpi-sub { font-size:11px; }

  /* Type cards */
  .type-cards { grid-template-columns:1fr 1fr; gap:8px; }
  .type-card { padding:12px; }
  .type-card .tc-value { font-size:20px; }

  /* Chart */
  .chart-wrap { padding:12px; }
  .section-title { font-size:14px; margin:16px 0 10px; }

  /* Warning list */
  .warn-item { padding:10px 12px; }
  .warn-item .warn-name { font-size:13px; }
  .warn-item .warn-gap { font-size:14px; width:60px; }
  .warn-item .warn-rate { width:48px; font-size:11px; }
  .warn-header .wh-gap { width:60px; }
  .warn-header .wh-rate { width:48px; }

  /* Tree */
  .tree-header { padding:10px 12px; }
  .tree-header .node-name { font-size:13px; }
  .tree-cols { font-size:10px; padding:6px 12px; }
  .tree-row { font-size:12px; padding:8px 12px; }
  .tree-row .col-name { font-size:12px; }
  .tree-row .col-num, .tree-row .col-rate { width:42px; }
  .tree-row .col-gap { width:48px; }
  .tree-row .col-target, .tree-row .col-gap2 { display:none; }
  .tree-cols span.col-target, .tree-cols span.col-gap2 { display:none; }
  .tree-header .node-stats { display:none; }
  .tree-children .tree-node { margin-left:16px; }

  /* Report cards */
  .report-grid { grid-template-columns:1fr; gap:12px; }
  .report-card-header { padding:12px; }
  .report-card-header .rc-name { font-size:14px; }
  .report-card-data { padding:10px 12px; grid-template-columns:1fr 1fr; gap:6px; }
  .report-card-data .rd-val { font-size:17px; }
  .report-card-keywords { padding:8px 12px; }
  .report-card-keywords .kw-tag { font-size:11px; }

  /* Detail popup */
  .detail-popup { width:92vw; max-height:80vh; }
  .detail-popup-header { padding:16px; }
  .detail-popup-header .dp-name { font-size:16px; }
  .detail-popup-body { padding:16px; }
  .detail-popup-body td { font-size:12px; padding:8px 10px; }

  /* Insight sections */
  .growth-band-row .gb-label { width:80px; font-size:11px; }
  .growth-band-row .gb-companies { padding-left:88px; font-size:11px; }
  .area-rank-table { font-size:12px; }
  .area-rank-table th, .area-rank-table td { padding:8px; }
  .status-legend { font-size:11px; gap:8px; }

  /* Risk + Action cards */
  .risk-card, .action-item { padding:12px; }
  .risk-card .risk-title { font-size:14px; }
  .risk-card .risk-desc { font-size:12px; }
  .action-item .ai-action { font-size:13px; }
  .action-item .ai-detail { font-size:11px; }
}

/* ============================================= */
/* MOBILE — 小屏手机 (max-width: 480px)           */
/* ============================================= */
@media (max-width:480px) {
  .container { padding:0 8px; }

  /* Header */
  .header { padding:10px 8px; flex-direction:column; gap:6px; }
  .header h1 { font-size:15px; }
  .header .badge-row { justify-content:flex-start; }

  /* Tabs — compact */
  .tabs { padding:0; }
  .tab-btn { font-size:11px; padding:10px 8px; }
  .tab-btn .tab-icon { font-size:14px; }

  /* KPI — 单列 */
  .kpi-row { grid-template-columns:1fr; gap:8px; }
  .kpi-card { padding:10px 12px; display:flex; flex-wrap:wrap; align-items:baseline; gap:8px; }
  .kpi-card .kpi-label { width:100%; margin-bottom:0; }
  .kpi-card .kpi-value { font-size:22px; }
  .kpi-card .kpi-sub { width:100%; margin-top:0; }

  /* Type cards */
  .type-cards { grid-template-columns:1fr 1fr; gap:6px; }

  /* Chart */
  .chart-wrap { padding:8px; }
  .chart-header { flex-direction:column; align-items:flex-start; }

  /* Warning list */
  .warn-header, .warn-item { padding:8px 10px; gap:8px; }
  .warn-item .warn-area { display:none; }

  /* Tree — further compress */
  .tree-cols { font-size:9px; padding:4px 8px; }
  .tree-row { font-size:11px; padding:6px 8px; }
  .tree-row .col-status { width:44px; }
  .tree-row .col-gap { width:42px; }
  .tree-children .tree-node { margin-left:8px; }

  /* Reports */
  .report-card-data { grid-template-columns:1fr 1fr; gap:4px; }

  /* Insight */
  .area-rank-table th:nth-child(3),
  .area-rank-table td:nth-child(3) { display:none; }

  /* Action items */
  .action-item { flex-direction:column; gap:8px; }
  
  /* Detail popup */
  .detail-popup { width:95vw; border-radius:8px; }
}

// 解密并初始化
function decryptAndInit() {
  var pass = document.getElementById("authPass").value;
  try {
    var bytes = CryptoJS.AES.decrypt(ENCRYPTED_DATA, pass);
    var json = bytes.toString(CryptoJS.enc.Utf8);
    if (!json || json.charAt(0) !== "{") throw new Error("bad password");
    window.DATA = JSON.parse(json);
    document.getElementById("authOverlay").style.display = "none";
    init();
  } catch(e) {
    document.getElementById("authError").style.display = "block";
  }
}

// ============================================================
// UTILS
// ============================================================
function fmtMoney(v) {
  if (v == null || isNaN(v)) return "—";
  return v.toFixed(2) + " 亿";
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return "—";
  var sign = v >= 0 ? "+" : "";
  return sign + (v * 100).toFixed(1) + "%";
}
function fmtGap(v) {
  if (v == null || isNaN(v)) return "—";
  return (v >= 0 ? "+" : "") + v.toFixed(4);
}

// ============================================================
// INIT
// ============================================================
function init() {
  document.getElementById("pageTitle").textContent = DATA.title || "企业营收监测系统";
  document.getElementById("pageMeta").textContent = DATA.period + " 数据更新：" + DATA.update_date;

  var b = document.getElementById("headerBadges");
  var t = DATA.total;
  b.innerHTML = "";
  if (t.danger_count > 0) b.innerHTML += '<span class="badge badge-danger">🔴 预警 ' + t.danger_count + ' 家</span>';
  if (t.warning_count > 0) b.innerHTML += '<span class="badge badge-warning">🟡 关注 ' + t.warning_count + ' 家</span>';
  if (t.exited_count > 0) b.innerHTML += '<span class="badge badge-info">⚫ 退库 ' + t.exited_count + ' 家</span>';

  buildKPI();
  buildTypeCards();
  buildAreaChart();
  buildWarnList();
  buildTree();
  buildReports();
  if (typeof buildInsightTab === "function") buildInsightTab();
}

// ============================================================
// TAB 1: KPI CARDS
// ============================================================
function buildKPI() {
  var t = DATA.total;
  var diff = t.income_2026 - t.income_2025;
  var kpiRows = [
    [
      {label:"全区总收入(1-5月)", value:fmtMoney(t.income_2026), sub:"目标 " + fmtMoney(t.target) + " · 达成率 " + (t.target ? ((t.income_2026/t.target)*100).toFixed(1) : "—") + "%", cls:t.gap_5pct < 0 ? "danger" : "normal"},
      {label:"同比增速", value:(t.growth >= 0 ? "+" : "") + t.growth.toFixed(1) + "%", sub:"较去年同期 " + fmtMoney(t.income_2025) + " " + (diff >= 0 ? "增加" : "下降") + " " + fmtMoney(Math.abs(diff)), cls:t.growth < 0 ? "danger" : "normal"},
      {label:"调度目标", value:fmtMoney(t.target - t.income_2025), sub:"目标总量 " + fmtMoney(t.target) + " · 较去年增长5%", cls:"info"},
    ],
    [
      {label:"监测企业", value:t.company_count + " 家", sub:"物业 " + DATA.type_summary["物业企业"].count + " 家 · 租赁 " + DATA.type_summary["租赁企业"].count + " 家", cls:"info"},
      {label:"转正缺口", value:fmtGap(t.gap_positive), sub:"25年同期 " + fmtMoney(t.income_2025), cls:t.gap_positive < 0 ? "danger" : "normal"},
      {label:"增速5%缺口", value:fmtGap(t.gap_5pct), sub:"目标达成率 " + (t.target ? ((t.income_2026/t.target)*100).toFixed(1) : "—") + "%", cls:t.gap_5pct < 0 ? "danger" : "normal"},
    ],
    [
      {label:"预警企业", value:t.danger_count + " 家", sub:"5%缺口 < -0.05亿", cls:t.danger_count > 0 ? "danger" : "normal"},
      {label:"关注企业", value:t.warning_count + " 家", sub:"增速为负/未达5%目标", cls:t.warning_count > 0 ? "warning" : "normal"},
      {label:"正常企业", value:t.normal_count + " 家", sub:"已退库 " + t.exited_count + " 家", cls:"normal"},
    ],
  ];
  var html = "";
  kpiRows.forEach(function(row) {
    html += '<div class="kpi-row">';
    row.forEach(function(k) {
      html += '<div class="kpi-card ' + k.cls + '"><div class="kpi-label">' + k.label + '</div><div class="kpi-value">' + k.value + '</div><div class="kpi-sub">' + k.sub + '</div></div>';
    });
    html += '</div>';
  });
  document.getElementById("kpiGrid").innerHTML = html;
}

// ============================================================
// TAB 1: TYPE CARDS
// ============================================================
function buildTypeCards() {
  var ts = DATA.type_summary;
  var icons = {"物业企业":"🏢","租赁企业":"🏬"};
  var html = "";
  Object.keys(ts).forEach(function(t) {
    var d = ts[t];
    html += '<div class="type-card"><div class="tc-icon">' + (icons[t]||"📌") + '</div><div class="tc-name">' + t + '</div><div class="tc-label">收入</div><div class="tc-value">' + fmtMoney(d.income_2026) + '</div><div class="tc-sub">' + d.count + ' 家企业</div></div>';
  });
  document.getElementById("typeCards").innerHTML = html;
}

// ============================================================
// TAB 1: AREA BAR CHART (SVG)
// ============================================================
var chartMode = "income";

function buildAreaChart(mode) {
  mode = mode || chartMode || "income";
  chartMode = mode;
  var areas = DATA.area_list;
  var w = 560, h = 240, padL = 80, padR = 20, padT = 10, padB = 40;
  var chartW = w - padL - padR;
  var chartH = h - padT - padB;
  var barW = Math.max(Math.floor(chartW / areas.length * 0.55), 28);
  var step = Math.floor(chartW / areas.length);
  var titles = {income: "各新城收入对比", growth: "各新城同比增速", gap: "各新城缺口对比"};
  var unit = {income: "亿", growth: "%", gap: "亿"};
  document.getElementById("areaChartTitle").textContent = titles[mode] || titles.income;

  var minVal = 0, maxVal = 0;
  var series = [];

  if (mode === "income") {
    var areaColors = ["#1a56db", "#16a34a", "#7c3aed", "#ea580c", "#0891b2"];
    areas.forEach(function(a) {
      var s = DATA.areas[a].summary;
      maxVal = Math.max(maxVal, s.income_2026);
    });
    maxVal *= 1.15;
    series = [areas.map(function(a, idx) {
      return {v: DATA.areas[a].summary.income_2026, label: DATA.areas[a].summary.income_2026.toFixed(2), color: areaColors[idx % areaColors.length]};
    })];
  } else if (mode === "growth") {
    areas.forEach(function(a) {
      var g = DATA.areas[a].summary.growth || 0;
      minVal = Math.min(minVal, g);
      maxVal = Math.max(maxVal, g);
    });
    var absMax = Math.max(Math.abs(minVal), Math.abs(maxVal), 5) * 1.3;
    minVal = -absMax;
    maxVal = absMax;
    series = [areas.map(function(a) {
      var g = DATA.areas[a].summary.growth || 0;
      return {v: g, label: (g >= 0 ? "+" : "") + g.toFixed(1) + "%", color: g >= 0 ? "#16a34a" : "#dc2626"};
    })];
  } else if (mode === "gap") {
    areas.forEach(function(a) {
      var s = DATA.areas[a].summary;
      var gp = s.income_2026 - s.income_2025;
      var g5 = s.gap_5pct || 0;
      minVal = Math.min(minVal, gp, g5);
      maxVal = Math.max(maxVal, gp, g5);
    });
    var aMax = Math.max(Math.abs(minVal), Math.abs(maxVal), 0.1) * 1.3;
    minVal = -aMax;
    maxVal = aMax;
    series = [
      areas.map(function(a) {
        var s = DATA.areas[a].summary;
        return {v: s.income_2026 - s.income_2025, label: (s.income_2026 - s.income_2025).toFixed(2), color: "#1a56db", name: "转正缺口"};
      }),
      areas.map(function(a) {
        var s = DATA.areas[a].summary;
        return {v: s.gap_5pct || 0, label: (s.gap_5pct || 0).toFixed(2), color: "#ea580c", name: "5%缺口"};
      })
    ];
  }

  var range = maxVal - minVal || 1;
  var yScale = chartH / range;

  function yPos(v) { return padT + chartH - (v - minVal) * yScale; }

  var svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" style="max-width:100%;height:auto;">';

  for (var i = 0; i <= 5; i++) {
    var val = minVal + range * i / 5;
    var y = yPos(val);
    var unit = mode === "growth" ? "%" : "亿";
    var fmt;
    if (mode === "growth") {
      fmt = (val >= 0 ? "+" : "") + val.toFixed(0) + unit;
    } else {
      fmt = val.toFixed(2) + unit;
    }
    svg += '<text x="' + (padL - 8) + '" y="' + (y + 4) + '" text-anchor="end" font-size="10" fill="#9ca3af">' + fmt + '</text>';
    svg += '<line x1="' + padL + '" y1="' + y + '" x2="' + (w - padR) + '" y2="' + y + '" stroke="#f3f4f6" stroke-width="1"/>';
  }

  if (mode !== "income" && minVal < 0) {
    var zy = yPos(0);
    svg += '<line x1="' + padL + '" y1="' + zy + '" x2="' + (w - padR) + '" y2="' + zy + '" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>';
  }

  var totalBars = series.length;
  var innerGap = totalBars > 1 ? 4 : 0;
  var eachBarW = totalBars > 1 ? (barW - innerGap) / totalBars : barW;

  series.forEach(function(s, si) {
    s.forEach(function(item, idx) {
      if (item.v == null) return;
      var xBase = padL + idx * step + (step - barW) / 2;
      var x = totalBars > 1 ? xBase + si * (eachBarW + innerGap) : xBase;
      var barH = Math.abs(item.v) * yScale;
      if (barH < 1) barH = 1;
      var y = item.v >= 0 ? yPos(item.v) : yPos(0);
      var c = item.color;
      svg += '<rect x="' + x + '" y="' + y + '" width="' + eachBarW + '" height="' + barH + '" rx="3" fill="' + c + '" opacity="0.85"/>';
      var labelY = item.v >= 0 ? y - 6 : y + barH + 13;
      svg += '<text x="' + (x + eachBarW/2) + '" y="' + labelY + '" text-anchor="middle" font-size="10" font-weight="600" fill="' + c + '">' + item.label + '</text>';
    });
  });

  areas.forEach(function(a, idx) {
    var x = padL + idx * step + step / 2;
    var areaName = a.replace("新城","");
    svg += '<text x="' + x + '" y="' + (h - 8) + '" text-anchor="middle" font-size="11" fill="#374151">' + areaName + '</text>';
  });

  // Legend top-right, vertically stacked
  var lx = w - padR - 4;
  var ly = padT + 6;
  var lh = 14;
  var areaColors = ["#1a56db", "#16a34a", "#7c3aed", "#ea580c", "#0891b2"];
  if (mode === "income") {
    areas.forEach(function(a, idx) {
      var sn = a.replace("新城","");
      var c = areaColors[idx % areaColors.length];
      var txW = sn.length * 10;
      svg += '<rect x="' + (lx - txW - 16) + '" y="' + (ly + idx * lh + 2) + '" width="8" height="8" rx="2" fill="' + c + '" opacity="0.85"/>';
      svg += '<text x="' + (lx - txW - 4) + '" y="' + (ly + idx * lh + 10) + '" text-anchor="start" font-size="9" fill="#4b5563">' + sn + '</text>';
    });
  } else if (mode === "growth") {
    svg += '<rect x="' + (lx - 56) + '" y="' + (ly + 2) + '" width="8" height="8" rx="2" fill="#16a34a" opacity="0.85"/>';
    svg += '<text x="' + (lx - 44) + '" y="' + (ly + 10) + '" text-anchor="start" font-size="9" fill="#4b5563">正增长</text>';
    svg += '<rect x="' + (lx - 56) + '" y="' + (ly + lh + 2) + '" width="8" height="8" rx="2" fill="#dc2626" opacity="0.85"/>';
    svg += '<text x="' + (lx - 44) + '" y="' + (ly + lh + 10) + '" text-anchor="start" font-size="9" fill="#4b5563">负增长</text>';
  } else if (mode === "gap") {
    svg += '<rect x="' + (lx - 62) + '" y="' + (ly + 2) + '" width="8" height="8" rx="2" fill="#1a56db" opacity="0.85"/>';
    svg += '<text x="' + (lx - 50) + '" y="' + (ly + 10) + '" text-anchor="start" font-size="9" fill="#4b5563">转正缺口</text>';
    svg += '<rect x="' + (lx - 62) + '" y="' + (ly + lh + 2) + '" width="8" height="8" rx="2" fill="#ea580c" opacity="0.85"/>';
    svg += '<text x="' + (lx - 50) + '" y="' + (ly + lh + 10) + '" text-anchor="start" font-size="9" fill="#4b5563">5%缺口</text>';
  }

  svg += '</svg>';
  document.getElementById("areaChart").innerHTML = svg;
}

// TAB 2: TREE
// ============================================================
function buildTree() {
  var html = "";
  DATA.area_list.forEach(function(areaName) {
    var area = DATA.areas[areaName];
    var s = area.summary;
    var sCls = s.danger_count > 0 ? "danger" : s.warning_count > 0 ? "warning" : "normal";
    var shortName = areaName.replace("新城","");

    html += '<div class="tree-node" data-area="' + areaName + '">';
    html += '<div class="tree-header" onclick="toggleTree(this)">';
    html += '<span class="arrow">▶</span>';
    html += '<span class="status-dot ' + sCls + '"></span>';
    html += '<span class="node-name">🏙️ ' + areaName + '</span>';
    html += '<span class="node-stats">收入 ' + s.income_2026.toFixed(2) + '亿 | ' + s.company_count + '家 | 预警' + (s.danger_count + s.warning_count) + '</span>';
    html += '</div>';
    html += '<div class="tree-children" data-area="' + areaName + '">';

    Object.keys(area.types).forEach(function(typeName) {
      var typeData = area.types[typeName];
      var ts = typeData.summary;
      var tCls = ts.danger_count > 0 ? "danger" : ts.warning_count > 0 ? "warning" : "normal";
      var icon = typeName.includes("物业") ? "🏢" : "🏬";

      html += '<div class="tree-node">';
      html += '<div class="tree-header" onclick="toggleTree(this)">';
      html += '<span class="arrow">▶</span>';
      html += '<span class="status-dot ' + tCls + '"></span>';
      html += '<span class="node-name">' + icon + ' ' + typeName + '</span>';
      html += '<span class="node-stats">' + ts.company_count + '家 | 收入 ' + ts.income_2026.toFixed(2) + '亿</span>';
      html += '</div>';
      html += '<div class="tree-children">';

      // Column headers for data rows
      html += '<div class="tree-cols"><span class="col-name">企业名称</span><span class="col-num">收入(亿)</span><span class="col-rate">增速</span><span class="col-target">目标</span><span class="col-gap">5%缺口</span><span class="col-gap2">转正缺口</span><span class="col-status">状态</span></div>';

      typeData.companies.forEach(function(c) {
        var rowCls = c.status === "danger" ? "danger" : c.status === "exited" ? "exited" : "";
        var gapCls = (c.gap_5pct||0) >= 0 ? "positive" : "negative";
        var gap2Cls = (c.gap_positive||0) >= 0 ? "positive" : "negative";
        html += '<div class="tree-row ' + rowCls + '" data-name="' + c.name + '" data-area="' + c.area + '" onclick="showDetail(' + c.seq + ')" title="点击查看详情">';
        html += '<span class="col-name">' + c.name + '</span>';
        html += '<span class="col-num">' + (c.income_2026 != null ? c.income_2026.toFixed(4) : "—") + '</span>';
        html += '<span class="col-rate">' + c.growth_display + '</span>';
        html += '<span class="col-target">' + (c.target != null ? c.target.toFixed(4) : "—") + '</span>';
        html += '<span class="col-gap ' + gapCls + '">' + fmtGap(c.gap_5pct) + '</span>';
        html += '<span class="col-gap2 ' + gap2Cls + '">' + fmtGap(c.gap_positive) + '</span>';
        html += '<span class="col-status"><span class="status-badge ' + c.status + '">' + c.status_label + '</span></span>';
        html += '</div>';
      });

      html += '</div></div>';
    });

    html += '</div></div>';
  });

  document.getElementById("treeRoot").innerHTML = html;
}

function toggleTree(header) {
  header.classList.toggle("expanded");
  var children = header.nextElementSibling;
  children.classList.toggle("open");
}

function filterTree() {
  var q = document.getElementById("searchInput").value.trim().toLowerCase();
  var rows = document.querySelectorAll("#treeRoot .tree-row");

  // If search is empty, collapse everything
  if (!q) {
    rows.forEach(function(r) { r.style.display = ""; });
    document.querySelectorAll("#treeRoot .tree-children").forEach(function(c) { c.classList.remove("open"); });
    document.querySelectorAll("#treeRoot .tree-header").forEach(function(h) { h.classList.remove("expanded"); });
    return;
  }

  // Expand all and filter
  document.querySelectorAll("#treeRoot .tree-children").forEach(function(c) { c.classList.add("open"); });
  document.querySelectorAll("#treeRoot .tree-header").forEach(function(h) { h.classList.add("expanded"); });

  rows.forEach(function(r) {
    var name = (r.getAttribute("data-name") || "").toLowerCase();
    var area = (r.getAttribute("data-area") || "").toLowerCase();
    if (name.includes(q) || area.includes(q)) {
      r.style.display = "";
    } else {
      r.style.display = "none";
    }
  });
}

function buildReports() {
  var filter = document.getElementById("reportFilter").value || "all";
  var problem = DATA.all_companies.filter(function(c) { return c.status !== "normal"; });

  var groups = [
    {id:"danger", label:"🔴 预警企业", cls:"danger", items:[]},
    {id:"warning", label:"🟡 关注企业", cls:"warning", items:[]},
    {id:"exited", label:"⚫ 退库企业", cls:"exited", items:[]}
  ];
  problem.forEach(function(c) {
    var g = groups.find(function(gx) { return gx.id === c.status; });
    if (g) g.items.push(c);
  });
  groups.forEach(function(g) { g.items.sort(function(a, b) { return (a.gap_5pct||0) - (b.gap_5pct||0); }); });

  var html = "";
  if (problem.length === 0) {
    html = '<div style="text-align:center;padding:40px;color:var(--gray)">所有企业经营正常 ✅</div>';
  }

  groups.forEach(function(g) {
    if (g.items.length === 0) return;
    if (filter !== "all" && filter !== g.id) return;
    html += '<div class="report-group-title ' + g.cls + '">' + g.label + ' (' + g.items.length + '家)</div>';
    g.items.forEach(function(c) {
      html += '<div class="report-card ' + c.status + '">';
      html += '<div class="report-card-header"><div class="rc-name">' + c.seq + '. ' + c.name + '</div>';
      html += '<div class="rc-meta"><span>' + c.area + '</span><span>' + c.type + '</span><span class="status-badge ' + c.status + '">' + c.status_label + '</span></div></div>';

      html += '<div class="report-card-data">';
      html += '<div class="rd-item"><div class="rd-val ' + ((c.gap_5pct||0) < 0 ? "red" : "green") + '">' + fmtMoney(c.income_2026) + '</div><div class="rd-label">2026收入</div></div>';
      html += '<div class="rd-item"><div class="rd-val">' + c.growth_display + '</div><div class="rd-label">同比增速</div></div>';
      html += '<div class="rd-item"><div class="rd-val ' + ((c.gap_5pct||0) < 0 ? "red" : "green") + '">' + fmtGap(c.gap_5pct) + '</div><div class="rd-label">5%增速缺口</div></div>';
      html += '<div class="rd-item"><div class="rd-val">' + fmtMoney(c.target) + '</div><div class="rd-label">调度目标</div></div>';
      html += '</div>';

      var tags = c.keywords_summary && c.keywords_summary.length > 0 ? c.keywords_summary : [];
      if (tags.length > 0) {
        html += '<div class="report-card-keywords"><span class="kw-section">原因总结</span>';
        tags.forEach(function(t) {
          html += '<span class="kw-tag">' + t + '</span>';
        });
        html += '</div>';
      }

      if (c.notes) {
        var noteId = 'note-' + c.seq;
        html += '<div class="report-card-notes-wrap">';
        html += '<span class="report-card-notes-toggle" onclick="var el=document.getElementById(\'' + noteId + '\');el.classList.toggle(\'open\');var t=this;t.textContent=el.classList.contains(\'open\')?\'▲ 收起详细说明\':\'▼ 展开详细说明\'">▼ 展开详细说明</span>';
        html += '<div class="report-card-notes-body" id="' + noteId + '">' + c.notes + '</div>';
        html += '</div>';
      }

      html += '</div>';
    });
  });

  document.getElementById("reportGrid").innerHTML = html;
}

// DETAIL POPUP
// ============================================================
function showDetail(seq) {
  var c = DATA.all_companies.find(function(x) { return x.seq === seq; });
  if (!c) return;

  var labels = {
    "income_2025": "2025年1-5月收入",
    "increase": "增加情况",
    "reported": "已网报",
    "income_2026": "2026年1-5月收入",
    "growth_display": "同比增速",
    "target": "调度目标",
    "gap_positive": "转正缺口",
    "gap_5pct": "增速5%缺口",
  };

  var rows = "";
  Object.keys(labels).forEach(function(k) {
    var v = c[k];
    if (v === undefined || v === null) v = "—";
    else if (typeof v === "number" && k !== "growth_rate") v = v.toFixed(4);
    rows += '<tr><td>' + labels[k] + '</td><td>' + v + '</td></tr>';
  });

  var html = '';
  html += '<div class="detail-overlay" onclick="closeDetail(event)">';
  html += '<div class="detail-popup" onclick="event.stopPropagation()">';
  html += '<div class="detail-popup-header"><div><div class="dp-name">' + c.name + '</div><div style="font-size:13px;color:var(--gray);margin-top:4px;">' + c.area + ' · ' + c.type + ' · <span class="status-badge ' + c.status + '">' + c.status_label + '</span></div></div>';
  html += '<button class="dp-close" onclick="closeDetail()">✕</button></div>';
  html += '<div class="detail-popup-body"><table>' + rows + '</table>';
  if (c.notes) html += '<div class="detail-notes"><strong>备注：</strong>' + c.notes + '</div>';
  html += '</div></div></div>';

  var el = document.createElement("div");
  el.id = "detailPopup";
  el.innerHTML = html;
  document.body.appendChild(el);
}

function closeDetail(e) {
  if (e && e.target !== e.currentTarget) return;
  var el = document.getElementById("detailPopup");
  if (el) el.remove();
}

function buildInsightTab() {
  // ── 全局概况 KPI ──
  var h = '<div class="kpi-row">';
  INSIGHT_DATA.overview.forEach(function(k) {
    h += '<div class="kpi-card ' + k.cls + '"><div class="kpi-label">' + k.label + '</div><div class="kpi-value">' + k.value + '</div><div class="kpi-sub">' + k.sub + '</div></div>';
  });
  h += '</div>';
  document.getElementById("insightKpiGrid").innerHTML = h;

  // ── 谁在拖后腿 ──
  h = '<div class="chart-wrap">';
  h += '<div style="font-size:13px;color:#4b5563;margin-bottom:12px;">全区5%缺口合计 <b style="color:#dc2626;">' + INSIGHT_DATA.gap_total + ' 亿</b>，但分布极不均衡：</div>';
  INSIGHT_DATA.gap_top5.forEach(function(d) {
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">';
    h += '<span style="width:170px;text-align:right;flex-shrink:0;font-size:12px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + d.name + '</span>';
    h += '<span style="height:22px;line-height:22px;border-radius:4px;background:#dc2626;color:#fff;font-size:11px;font-weight:600;text-align:right;padding-right:6px;min-width:30px;width:' + d.bar + '%;max-width:100%;">' + d.gap + '</span>';
    h += '<span style="width:48px;text-align:right;flex-shrink:0;font-size:12px;font-weight:700;color:#dc2626;">' + d.pct + '</span>';
    h += '</div>';
  });
  h += '<div style="border-top:1px dashed #e5e7eb;margin:10px 0;padding-top:8px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;">';
  h += '<span style="width:170px;text-align:right;flex-shrink:0;color:#374151;">前5家合计</span>';
  h += '<span style="color:#dc2626;">' + INSIGHT_DATA.gap_top5_sum + ' 亿 · 占 ' + INSIGHT_DATA.gap_top5_pct + '%</span></div>';
  h += '<div style="font-size:12px;color:#6b7280;margin-top:8px;padding:8px 12px;background:#f9fafb;border-radius:6px;">📌 ' + INSIGHT_DATA.gap_note + '</div>';
  h += '</div>';
  document.getElementById("insightGapSection").innerHTML = h;

  // ── 各企业跑得怎么样 ──
  h = '';
  INSIGHT_DATA.bands.forEach(function(b) {
    var grow = parseFloat(b.pct);
    h += '<div style="margin-bottom:10px;">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">';
    h += '<span style="width:80px;text-align:right;flex-shrink:0;font-size:12px;color:#6b7280;">' + b.label + '</span>';
    h += '<span style="flex-grow:' + grow + ';flex-shrink:1;flex-basis:0;min-width:24px;height:24px;line-height:24px;border-radius:4px;background:' + b.color + ';color:#fff;font-size:12px;font-weight:600;text-align:center;overflow:hidden;white-space:nowrap;">' + b.n + ' 家</span>';
    h += '<span style="width:36px;text-align:right;flex-shrink:0;font-size:12px;font-weight:600;">' + b.n + '</span>';
    h += '<span style="width:44px;text-align:right;flex-shrink:0;font-size:12px;color:#9ca3af;">' + b.pct + '</span>';
    h += '</div>';
    h += '<div style="font-size:11px;color:#9ca3af;padding-left:88px;">' + b.list + '</div>';
    h += '</div>';
  });
  h += '<div style="font-size:12px;color:#6b7280;margin-top:12px;padding:8px 12px;background:#f9fafb;border-radius:6px;">📌 ' + INSIGHT_DATA.band_note + '</div>';
  document.getElementById("insightGrowthChart").innerHTML = h;

  // ── 各新城对比表 ──
  h = '<div style="margin-top:16px;">';
  h += '<table class="area-rank-table"><thead><tr><th class="rank-num">#</th><th>新城</th><th>收入</th><th>增速</th><th>5%缺口</th><th>状态</th></tr></thead><tbody>';
  INSIGHT_DATA.area_rank.forEach(function(a, i) {
    var sc = a.ok ? "normal" : "danger";
    var gc = a.growth.charAt(0) === "+" ? "positive" : "negative";
    h += '<tr><td class="rank-num">' + (i+1) + '</td><td><strong>' + a.name + '</strong></td>';
    h += '<td>' + a.rev + '</td><td class="growth-val ' + gc + '">' + a.growth + '</td>';
    h += '<td style="font-weight:600;color:' + (a.ok ? '#16a34a' : '#dc2626') + ';">' + a.gap + '</td>';
    h += '<td><span class="status-badge ' + sc + '">' + (a.ok ? '达标' : '未达标') + '</span></td></tr>';
  });
  h += '</tbody></table>';
  h += '<div style="font-size:12px;color:#6b7280;margin-top:8px;padding:8px 12px;background:#f9fafb;border-radius:6px;">📌 ' + INSIGHT_DATA.area_note + '</div>';
  h += '</div>';
  document.getElementById("insightGrowthChart").innerHTML += h;

  // ── 物业 vs 租赁 ──
  var tc = INSIGHT_DATA.type_compare;
  h = '<div class="chart-wrap"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';
  [tc.property, tc.leasing].forEach(function(t) {
    h += '<div style="background:#f9fafb;border-radius:8px;padding:16px;">';
    h += '<div style="font-size:15px;font-weight:700;color:#1e293b;margin-bottom:8px;">' + t.label + '</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">';
    h += '<div><span style="font-size:11px;color:#9ca3af;">收入</span><div style="font-size:18px;font-weight:700;color:#1a56db;">' + t.rev + '</div></div>';
    h += '<div><span style="font-size:11px;color:#9ca3af;">增速</span><div style="font-size:18px;font-weight:700;color:#dc2626;">' + t.growth + '</div></div>';
    h += '<div><span style="font-size:11px;color:#9ca3af;">企业数</span><div style="font-size:16px;font-weight:600;">' + t.count + ' 家</div></div>';
    h += '<div><span style="font-size:11px;color:#9ca3af;">预警/关注</span><div style="font-size:16px;font-weight:600;"><span style="color:#dc2626;">' + t.danger + '</span> / <span style="color:#ea580c;">' + t.warn + '</span></div></div>';
    h += '</div>';
    h += '<div style="font-size:11px;color:#6b7280;line-height:1.6;">主要问题：' + t.top_issue + '</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="font-size:12px;color:#6b7280;margin-top:12px;padding:8px 12px;background:#f9fafb;border-radius:6px;">📌 ' + INSIGHT_DATA.type_note + '</div>';
  h += '</div>';
  document.getElementById("insightTypeSection").innerHTML = h;

  // ── 表面还行，实际危险 ──
  h = '<div class="chart-wrap">';
  h += '<table class="area-rank-table"><thead><tr><th>企业</th><th style="text-align:right">超去年（K）</th><th style="text-align:right">5%缺口（L）</th><th>什么意思</th></tr></thead><tbody>';
  INSIGHT_DATA.false_safe.forEach(function(f) {
    h += '<tr><td>' + f.name + '</td><td style="text-align:right;color:#16a34a;">' + f.K + '</td>';
    h += '<td style="text-align:right;color:#dc2626;font-weight:600;">' + f.L + '</td>';
    h += '<td style="font-size:12px;color:#6b7280;">' + f.meaning + '</td></tr>';
  });
  h += '</tbody></table>';
  h += '<div style="font-size:12px;color:#6b7280;margin-top:8px;padding:8px 12px;background:#f9fafb;border-radius:6px;">📌 ' + INSIGHT_DATA.false_safe_note + '</div>';
  h += '</div>';
  document.getElementById("insightFalseSafeSection").innerHTML = h;

  // ── 深层风险 ──
  h = '';
  INSIGHT_DATA.risks.forEach(function(r, i) {
    var border = i === 0 ? "#dc2626" : "#ea580c";
    h += '<div style="background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:16px;margin-bottom:12px;border-left:3px solid ' + border + ';">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
    h += '<span style="font-size:16px;">' + r.icon + '</span>';
    h += '<span style="font-size:14px;font-weight:700;color:#1e293b;">' + r.title + '</span></div>';
    h += '<div style="font-size:13px;color:#4b5563;line-height:1.8;margin-bottom:8px;">' + r.desc + '</div>';
    h += '<div style="font-size:11px;color:#9ca3af;">涉及：' + r.list + '</div></div>';
  });
  document.getElementById("insightRiskSection").innerHTML = h;

  // ── 老毛病排行 ──
  h = '<div class="chart-wrap">';
  INSIGHT_DATA.cause_rank.forEach(function(c) {
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">';
    h += '<span style="width:110px;text-align:right;flex-shrink:0;font-size:12px;color:#374151;">' + c.label + '</span>';
    h += '<span style="height:22px;line-height:22px;border-radius:4px;background:' + c.color + ';color:#fff;font-size:11px;font-weight:600;padding:0 8px;min-width:40px;width:' + c.bar + '%;max-width:100%;">' + c.n + ' 家</span>';
    h += '</div>';
  });
  h += '<div style="font-size:12px;color:#6b7280;margin-top:8px;padding:8px 12px;background:#f9fafb;border-radius:6px;">📌 ' + INSIGHT_DATA.cause_note + '</div>';
  h += '</div>';
  document.getElementById("insightCauseSection").innerHTML = h;

  // ── 谁做得好 ──
  h = '<div class="report-grid">';
  INSIGHT_DATA.leaders.forEach(function(l) {
    h += '<div style="background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:16px;">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">';
    h += '<span style="font-size:14px;font-weight:600;">' + l.name + '</span>';
    h += '<span style="font-size:18px;font-weight:700;color:#16a34a;">' + l.g + '</span></div>';
    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;font-size:11px;color:#6b7280;">' + l.area;
    h += '<span style="display:inline-block;padding:1px 6px;border-radius:3px;background:#f0fdf4;color:#16a34a;font-size:10px;font-weight:500;">' + l.tag + '</span></div>';
    h += '<div style="font-size:12px;color:#4b5563;line-height:1.6;">' + l.why + '</div>';
    h += '</div>';
  });
  h += '</div>';
  document.getElementById("insightLeaderSection").innerHTML = h;

  // ── 怎么办 ──
  h = '';
  var pLabel = {urgent:"紧急", important:"重要", continuous:"持续"};
  var pColor = {urgent:"#dc2626", important:"#ea580c", continuous:"#1a56db"};
  var pBg    = {urgent:"#fef2f2", important:"#fff7ed", continuous:"#e8f0fe"};
  INSIGHT_DATA.actions.forEach(function(a) {
    h += '<div style="background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;">';
    h += '<span style="padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;color:' + pColor[a.p] + ';background:' + pBg[a.p] + ';flex-shrink:0;">' + pLabel[a.p] + '</span>';
    h += '<div><div style="font-size:14px;font-weight:600;margin-bottom:3px;">' + a.t + '</div>';
    h += '<div style="font-size:12px;color:#4b5563;line-height:1.7;">' + a.d + '</div></div></div>';
  });
  document.getElementById("insightActionSection").innerHTML = h;
}
